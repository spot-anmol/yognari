name: Deploy to Firebase Hosting (live)

# Auto-deploy the site whenever code lands on main (your own pushes AND Lovable syncs).
on:
  push:
    branches:
      - main
  # Allow manual re-runs from the GitHub Actions tab.
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site (prerender -> dist/client)
        run: bun run build

      - name: Deploy to Firebase Hosting live channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_YOGNARI }}
          channelId: live
          projectId: yognari
