name: Deploy to Firebase Hosting (live)

# Auto-deploy the site whenever code lands on main.
on:
  push:
    branches:
      - main
  # Allow manual re-runs from the GitHub Actions tab.
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static site (prerender -> dist/client)
        run: npm run build
        env:
          # Public-by-design Web3Forms key (only sends to the bound inbox). Set this
          # repo variable under Settings → Secrets and variables → Actions → Variables.
          VITE_WEB3FORMS_ACCESS_KEY: ${{ vars.VITE_WEB3FORMS_ACCESS_KEY }}

      - name: Deploy to Firebase Hosting live channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_YOGNARI }}
          channelId: live
          projectId: yognari
